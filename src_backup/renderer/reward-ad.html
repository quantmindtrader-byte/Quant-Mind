<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com; connect-src 'self' https://pagead2.googlesyndication.com;">
    <title>Watch Ad to Continue</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
        }
        .action-text {
            font-size: 16px;
            color: #FFD700;
            font-weight: 500;
            margin-bottom: 10px;
        }
        p {
            margin: 0 0 30px 0;
            opacity: 0.9;
            line-height: 1.5;
            font-size: 14px;
        }
        .ad-container {
            width: 100%;
            max-width: 320px;
            height: 240px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            position: relative;
        }
        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
            margin: 8px;
            min-width: 120px;
        }
        .btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .skip-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        .skip-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }
        .upgrade-hint {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            font-size: 12px;
            color: #FFD700;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 1s linear;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎬</div>
        <h1>Watch Ad to Continue</h1>
        <div class="action-text" id="actionText">Loading...</div>
        <p>Free users need to watch a short ad to access this feature.<br>Upgrade to a paid plan to skip ads!</p>
        
        <div class="ad-container" id="adContainer">
            <div class="loading">
                <div class="spinner"></div>
                <span>Loading ad...</span>
            </div>
        </div>
        
        <div>
            <button class="btn" id="watchAdBtn" onclick="startAd()" disabled>Watch Ad (30s)</button>
        </div>
        
        <div class="upgrade-hint">
            💡 Upgrade to Premium to skip all ads and unlock unlimited features!
        </div>
    </div>

    <!-- Google AdMob Integration -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-4738904073913718" crossorigin="anonymous"></script>
    
    <script>
        let adWatched = false;
        let adLoaded = false;
        let currentAction = 'continue';

        // Action messages mapping
        const actionMessages = {
            'start-bot': 'You need to watch an ad to start the trading bot',
            'force-reanalysis': 'You need to watch an ad to force market reanalysis',
            'save-config': 'You need to watch an ad to save configuration',
            'save-trading-params': 'You need to watch an ad to save trading parameters',
            'save-symbols': 'You need to watch an ad to save symbol configuration',
            'continue': 'You need to watch an ad to continue'
        };

        // Listen for action context from main process
        if (window.electronAPI) {
            window.electronAPI.onSetAdContext((context) => {
                currentAction = context.action || 'continue';
                updateActionText();
            });
        }

        function updateActionText() {
            const actionText = document.getElementById('actionText');
            actionText.textContent = actionMessages[currentAction] || actionMessages['continue'];
        }

        function initializeAd() {
            console.log('DEBUG: initializeAd() called');
            updateActionText();
            
            // Check if AdMob script loaded
            const admobScript = document.querySelector('script[src*="adsbygoogle.js"]');
            console.log('DEBUG: AdMob script element found:', !!admobScript);
            console.log('DEBUG: window.adsbygoogle exists:', !!window.adsbygoogle);
            
            // Wait for AdMob script to load or timeout after 5 seconds
            let attempts = 0;
            const maxAttempts = 10; // 5 seconds total
            
            const checkAdMobReady = () => {
                attempts++;
                console.log(`DEBUG: Checking AdMob readiness, attempt ${attempts}`);
                
                if (window.adsbygoogle && typeof window.adsbygoogle.push === 'function') {
                    console.log('DEBUG: AdMob SDK ready, initializing');
                    try {
                        (adsbygoogle = window.adsbygoogle || []).push({
                            google_ad_client: "ca-app-pub-4738904073913718",
                            enable_page_level_ads: true
                        });
                        console.log('DEBUG: AdMob push completed');
                        
                        // Create rewarded ad
                        const rewardedAd = {
                            adUnitId: 'ca-app-pub-4738904073913718/7475819589',
                            loaded: false
                        };
                        
                        setTimeout(() => {
                            console.log('DEBUG: AdMob ad ready');
                            document.getElementById('adContainer').innerHTML = `
                                <div style="background: linear-gradient(45deg, #1a1a1a, #2d2d2d); width: 100%; height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; position: relative;">
                                    <div style="text-align: center;">
                                        <div style="font-size: 32px; margin-bottom: 15px;">📺</div>
                                        <div style="font-size: 16px; font-weight: 500;">AdMob Rewarded Ad</div>
                                        <div style="font-size: 12px; opacity: 0.7; margin-top: 8px;">Click "Watch Ad" to start</div>
                                        <div style="position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 12px; font-size: 10px;">AdMob</div>
                                    </div>
                                </div>
                            `;
                            document.getElementById('watchAdBtn').disabled = false;
                            adLoaded = true;
                            rewardedAd.loaded = true;
                            window.rewardedAd = rewardedAd;
                            console.log('DEBUG: AdMob ad ready, button enabled');
                        }, 1000);
                        
                    } catch (error) {
                        console.error('DEBUG: AdMob initialization error:', error);
                        initializeDemoAd();
                    }
                } else if (attempts >= maxAttempts) {
                    console.log('DEBUG: AdMob timeout, using demo ad');
                    initializeDemoAd();
                } else {
                    console.log('DEBUG: AdMob not ready, retrying in 500ms');
                    setTimeout(checkAdMobReady, 500);
                }
            };
            
            // Start checking for AdMob readiness
            checkAdMobReady();
        }
        
        function initializeDemoAd() {
            console.log('DEBUG: initializeDemoAd() called');
            setTimeout(() => {
                console.log('DEBUG: Demo ad loading completed');
                document.getElementById('adContainer').innerHTML = `
                    <div style="background: linear-gradient(45deg, #1a1a1a, #2d2d2d); width: 100%; height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; position: relative;">
                        <div style="text-align: center;">
                            <div style="font-size: 32px; margin-bottom: 15px;">📺</div>
                            <div style="font-size: 16px; font-weight: 500;">Demo Rewarded Ad</div>
                            <div style="font-size: 12px; opacity: 0.7; margin-top: 8px;">Click "Watch Ad" to start</div>
                            <div style="position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 12px; font-size: 10px;">Demo</div>
                        </div>
                    </div>
                `;
                document.getElementById('watchAdBtn').disabled = false;
                adLoaded = true;
                console.log('DEBUG: Demo ad ready, button enabled');
            }, 2000);
        }

        function startAd() {
            console.log('DEBUG: startAd() called');
            console.log('DEBUG: adLoaded status:', adLoaded);
            
            if (!adLoaded) {
                console.log('DEBUG: Ad not loaded, cannot start');
                return;
            }
            
            document.getElementById('watchAdBtn').disabled = true;
            const skipBtn = document.getElementById('skipBtn');
            if (skipBtn) skipBtn.disabled = true;
            
            // Show AdMob rewarded ad (simulated for now)
            if (window.rewardedAd && window.rewardedAd.loaded) {
                console.log('DEBUG: Starting AdMob ad');
                showAdMobAd();
            } else {
                console.log('DEBUG: Starting demo ad');
                showDemoAd();
            }
        }
        
        function showAdMobAd() {
            let countdown = 30; // AdMob ads are typically 15-30 seconds
            const adContainer = document.getElementById('adContainer');
            
            adContainer.innerHTML = `
                <div style="background: #000; width: 100%; height: 100%; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; position: relative;">
                    <div style="font-size: 40px; margin-bottom: 15px;">🎥</div>
                    <div style="font-size: 18px; font-weight: 500;">AdMob Rewarded Video</div>
                    <div style="font-size: 32px; margin: 15px 0; color: #4CAF50; font-weight: bold;" id="countdown">${countdown}s</div>
                    <div style="font-size: 12px; opacity: 0.7;">Earning reward...</div>
                    <div class="progress-bar" style="position: absolute; bottom: 10px; left: 10px; right: 10px;">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div style="position: absolute; top: 8px; right: 8px; background: rgba(76,175,80,0.2); padding: 4px 8px; border-radius: 12px; font-size: 10px; color: #4CAF50;">AdMob Live</div>
                </div>
            `;
            
            const timer = setInterval(() => {
                const countdownEl = document.getElementById('countdown');
                const progressFill = document.getElementById('progressFill');
                
                if (countdownEl) {
                    countdownEl.textContent = `${countdown}s`;
                }
                
                if (progressFill) {
                    const progress = ((30 - countdown) / 30) * 100;
                    progressFill.style.width = `${progress}%`;
                }
                
                countdown--;
                
                if (countdown < 0) {
                    clearInterval(timer);
                    completeAd();
                }
            }, 1000);
        }
        
        function showDemoAd() {
            let countdown = 15;
            const adContainer = document.getElementById('adContainer');
            
            adContainer.innerHTML = `
                <div style="background: #000; width: 100%; height: 100%; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; position: relative;">
                    <div style="font-size: 40px; margin-bottom: 15px;">🎥</div>
                    <div style="font-size: 18px; font-weight: 500;">Playing Demo Ad</div>
                    <div style="font-size: 32px; margin: 15px 0; color: #4CAF50; font-weight: bold;" id="countdown">${countdown}s</div>
                    <div style="font-size: 12px; opacity: 0.7;">Please wait for the ad to complete</div>
                    <div class="progress-bar" style="position: absolute; bottom: 10px; left: 10px; right: 10px;">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            `;
            
            const timer = setInterval(() => {
                const countdownEl = document.getElementById('countdown');
                const progressFill = document.getElementById('progressFill');
                
                if (countdownEl) {
                    countdownEl.textContent = `${countdown}s`;
                }
                
                if (progressFill) {
                    const progress = ((15 - countdown) / 15) * 100;
                    progressFill.style.width = `${progress}%`;
                }
                
                countdown--;
                
                if (countdown < 0) {
                    clearInterval(timer);
                    completeAd();
                }
            }, 1000);
        }

        function completeAd() {
            adWatched = true;
            const adContainer = document.getElementById('adContainer');
            
            adContainer.innerHTML = `
                <div style="background: linear-gradient(45deg, #4CAF50, #45a049); width: 100%; height: 100%; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; position: relative;">
                    <div style="font-size: 48px; margin-bottom: 15px; animation: bounce 0.6s ease-in-out;">✅</div>
                    <div style="font-size: 18px; font-weight: 600;">Ad Complete!</div>
                    <div style="font-size: 14px; opacity: 0.9; margin-top: 8px;">Thank you for watching</div>
                    <div style="font-size: 12px; opacity: 0.8; margin-top: 5px;">You can now ${currentAction.replace('-', ' ')}</div>
                </div>
            `;
            
            // Add bounce animation
            const style = document.createElement('style');
            style.textContent = `
                @keyframes bounce {
                    0%, 20%, 60%, 100% { transform: translateY(0); }
                    40% { transform: translateY(-10px); }
                    80% { transform: translateY(-5px); }
                }
            `;
            document.head.appendChild(style);
            
            document.getElementById('watchAdBtn').style.display = 'none';
            
            // Auto-close after 2 seconds
            setTimeout(() => {
                if (window.electronAPI) {
                    window.electronAPI.adCompleted(true);
                }
            }, 2000);
        }



        // Initialize when page loads
        window.addEventListener('load', () => {
            console.log('DEBUG: Window loaded, initializing ad');
            console.log('DEBUG: Current URL:', window.location.href);
            console.log('DEBUG: User agent:', navigator.userAgent);
            console.log('DEBUG: Online status:', navigator.onLine);
            initializeAd();
        });
        
        // Additional debug for AdMob script loading
        window.addEventListener('DOMContentLoaded', () => {
            console.log('DEBUG: DOM loaded');
            const admobScript = document.querySelector('script[src*="adsbygoogle.js"]');
            if (admobScript) {
                console.log('DEBUG: AdMob script found in DOM');
                admobScript.onload = () => console.log('DEBUG: AdMob script loaded successfully');
                admobScript.onerror = (e) => console.error('DEBUG: AdMob script failed to load:', e);
            } else {
                console.log('DEBUG: AdMob script not found in DOM');
            }
        });
        
        // Handle window close - reset config if ad not watched
        window.addEventListener('beforeunload', () => {
            if (!adWatched && window.electronAPI) {
                window.electronAPI.adCompleted(false);
            }
        });
        
        // Handle ESC key to close window
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !adWatched) {
                if (window.electronAPI) {
                    window.electronAPI.adCompleted(false);
                }
            }
        });
    </script>
</body>
</html>
